<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3013 호출 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .bg-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-custom h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">3013 무인매장</h1>
        <p class="text-gray-500 mb-8">사장님께 호출 메시지를 보냅니다.</p>

        <button id="call-btn" onclick="sendCall()" class="w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-4 rounded-2xl transition-all duration-300 flex items-center justify-center gap-2 text-xl mb-6">
            <span id="btn-text">🔔 호출하기</span>
        </button>

        <div class="bg-blue-50 rounded-2xl p-6 border border-blue-100">
            <div class="flex items-center justify-center gap-2 mb-2 text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
                <span class="font-bold">사장님 답변:</span>
            </div>
            <p id="reply-text" class="text-2xl font-bold text-blue-800">대기 중...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 1. 호출 보내기 (Pipedream 연결)
        function sendCall() {
            const btn = document.getElementById('call-btn');
            const btnText = document.getElementById('btn-text');
            
            btn.disabled = true;
            btn.classList.replace('bg-gray-400', 'bg-blue-600');
            btnText.innerText = "🔔 호출중...";

            fetch("https://eoxgjm9ebdy2yc5.m.pipedream.net")
                .then(response => {
                    console.log("호출 성공");
                })
                .catch(error => {
                    console.error("호출 실패", error);
                    alert("호출에 실패했습니다. 다시 시도해주세요.");
                    btn.disabled = false;
                    btn.classList.replace('bg-blue-600', 'bg-gray-400');
                    btnText.innerText = "🔔 호출하기";
                });
        }

        // 2. 사장님 답변 실시간 감시 (Firebase 연결)
        const firebaseConfig = {
            databaseURL: "https://storecall0313-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);

        const replyRef = firebase.database().ref('stores/S001/manager_reply');
        replyRef.on('value', (snapshot) => {
            const message = snapshot.val();
            const replyElement = document.getElementById('reply-text');
            
            if (message && message !== "대기 중...") {
                replyElement.innerText = message;
                replyElement.classList.add('animate-bounce');
                setTimeout(() => replyElement.classList.remove('animate-bounce'), 3000);
            }
        });
    </script>
</body>
</html>

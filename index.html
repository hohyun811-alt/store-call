<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>3013 PREMIUM CALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-user-select: none; user-select: none; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(135deg, #c5a059 0%, #926d27 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .premium-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 overflow-hidden">

    <div class="w-full max-w-lg glass rounded-[40px] p-12 text-center premium-shadow relative">
        <div class="mb-16">
            <h1 class="serif text-5xl mb-4 tracking-widest text-[#c5a059]">3013</h1>
            <div class="h-[1px] w-12 bg-[#c5a059] mx-auto mb-6"></div>
            <p id="main-display" class="text-xl font-light leading-relaxed tracking-tight text-slate-300 min-h-[100px] flex items-center justify-center">
                직원이 잠시 자리를 비웠습니다.<br>도움이 필요하시면 아래 버튼을 눌러주십시오.
            </p>
        </div>

        <div class="space-y-6">
            <button id="call-btn" onclick="sendCall()" class="w-full gold-gradient text-white py-8 rounded-2xl text-2xl font-bold tracking-widest transition-all active:scale-95 shadow-lg">
                호출하기
            </button>

            <button id="reset-btn" onclick="managerArrives()" class="hidden w-full border border-[#c5a059] text-[#c5a059] py-8 rounded-2xl text-2xl font-bold tracking-widest transition-all active:scale-95 bg-transparent">
                서비스 종료 및 대기모드 전환
            </button>
        </div>

        <p class="mt-16 text-[10px] tracking-[0.3em] text-slate-500 uppercase">Premium Concierge Service</p>
    </div>

    <div onclick="managerLeaves()" class="absolute bottom-4 right-4 w-20 h-20 opacity-0 cursor-pointer z-50"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const GREETING = "직원이 잠시 자리를 비웠습니다. 직원의 응대가 필요하시면 호출 버튼을 눌러주세요";
        const FIREBASE_URL = "https://storecall0313-default-rtdb.asia-southeast1.firebasedatabase.app";
        const WEBHOOK_URL = "https://eoxgjm9ebdy2yc5.m.pipedream.net";
        
        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();
        const synthesis = window.speechSynthesis;
        let isLooping = false;

        const mainDisplay = document.getElementById('main-display');
        const callBtn = document.getElementById('call-btn');
        const resetBtn = document.getElementById('reset-btn');

        // 1. 음성 안내 루프
        function speak() {
            if (!isLooping) return;
            synthesis.cancel();
            const msg = new SpeechSynthesisUtterance(GREETING);
            msg.lang = 'ko-KR';
            msg.rate = 0.9;
            msg.onend = () => { if(isLooping) setTimeout(speak, 5000); };
            synthesis.speak(msg);
        }

        // 2. 초기 터치 시 음성 활성화
        document.body.addEventListener('click', () => { 
            // 호출 중이거나 답변 화면일 때는 음성을 시작하지 않음
            if(!isLooping && !callBtn.disabled && resetBtn.classList.contains('hidden')) { 
                isLooping = true; 
                speak(); 
            } 
        }, {once: true});

        // 3. 호출하기
        function sendCall() {
            isLooping = false;
            synthesis.cancel();
            
            callBtn.disabled = true;
            callBtn.innerText = "연결 중...";
            callBtn.style.opacity = "0.5";
            mainDisplay.innerHTML = "매니저에게 호출 신호를 보냈습니다.<br><span class='text-sm opacity-50 font-light mt-2'>잠시만 기다려 주십시오.</span>";

            fetch(WEBHOOK_URL).then(() => console.log("Call Sent"));
        }

        // 4. 답변 수신 대기 및 버튼 전환
        db.ref('stores/S001/manager_reply').on('value', (snap) => {
            const msg = snap.val();
            if (msg && msg !== "대기 중...") {
                isLooping = false;
                synthesis.cancel();
                mainDisplay.innerHTML = `<span class='text-[#c5a059] font-bold text-3xl'>${msg}</span>`;
                callBtn.classList.add('hidden');
                resetBtn.classList.remove('hidden'); // 서비스 종료 버튼 활성화
            }
        });

        // 5. 매니저 도착 (서비스 종료 및 초기화)
        function managerArrives() {
            isLooping = false;
            synthesis.cancel();
            
            db.ref('stores/S001/manager_reply').set("대기 중...");
            
            mainDisplay.innerHTML = "직원이 잠시 자리를 비웠습니다.<br>도움이 필요하시면 아래 버튼을 눌러주십시오.";
            callBtn.classList.remove('hidden');
            callBtn.disabled = false;
            callBtn.innerText = "호출하기";
            callBtn.style.opacity = "1";
            resetBtn.classList.add('hidden');
        }

        // 6. 매니저 퇴실 (숨겨진 우측 하단 터치 시 음성 재시작)
        function managerLeaves() {
            if(!resetBtn.classList.contains('hidden') || callBtn.disabled) return; // 호출 중/답변 중에는 작동안함
            alert("퇴실 확인: 안내 음성을 다시 시작합니다.");
            isLooping = true;
            speak();
        }
    </script>
</body>
</html>

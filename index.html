<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>THE KIOSK | PREMIUM CONCIERGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@100;300;400;500;700&display=swap');
        
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0a0f1a; color: #f1f5f9; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; height: 100dvh; margin: 0; user-select: none; -webkit-user-select: none; }
        
        .premium-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(197, 160, 89, 0.2); width: 85%; max-width: 850px; padding: 2.5rem 4rem; border-radius: 8px; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7); position: relative; z-index: 10; margin-top: -2vh; }
        
        .title-wrapper { display: inline-block; text-align: center; }
        .brand-logo { font-family: 'Playfair Display', serif; letter-spacing: 0.6em; color: #c5a059; text-transform: uppercase; margin-right: -0.6em; }
        
        .message-box { border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(0, 0, 0, 0.2); padding: 1.5rem 2rem; border-radius: 6px; margin-bottom: 1.5rem; min-height: 140px; display: flex; align-items: center; justify-content: center; }
        
        .gold-btn { background-color: #c5a059; color: #ffffff; transition: all 0.3s ease; letter-spacing: 0.2em; font-weight: 700; border: none; cursor: pointer; }
        .gold-btn:active { transform: scale(0.98); background-color: #a68445; }
        .outline-btn { border: 1px solid rgba(197, 160, 89, 0.5); color: #c5a059; transition: all 0.3s ease; letter-spacing: 0.1em; background: transparent; cursor: pointer; }
    </style>
</head>
<body>
    <div class="premium-card text-center">
        <header class="mb-8">
            <div class="title-wrapper">
                <h1 class="brand-logo text-4xl md:text-5xl">The Kiosk</h1>
            </div>
        </header>

        <main>
            <div class="message-box">
                <div id="main-display">
                    <p class="text-2xl md:text-3xl font-light leading-relaxed tracking-tight text-slate-200">
                        직원이 잠시 자리를 비웠습니다.<br>
                        응대가 필요하시면 <span class="text-[#c5a059] font-medium">[호출하기]</span>버튼을 눌러주세요!
                    </p>
                </div>
            </div>
            <p class="text-lg md:text-xl opacity-70 mb-8 font-extralight tracking-widest italic">Please press the button for assistance.</p>
        </main>

        <footer class="flex flex-col items-center gap-6 mt-4">
            <button id="call-btn" onclick="sendCall()" class="gold-btn w-full max-w-sm py-6 rounded-md text-2xl font-bold shadow-[0_8px_30px_rgba(197,160,89,0.35)]">호출하기</button>
            <button id="reset-btn" onclick="managerArrives()" class="hidden outline-btn w-full max-w-sm py-6 rounded-md text-xl">응대 완료 및 대기 전환</button>
        </footer>
    </div>
    <div onclick="managerLeaves()" class="absolute bottom-0 right-0 w-32 h-32 opacity-0 cursor-pointer z-50"></div> 

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const STORE_ID = urlParams.get('store_id') || 'S001';

        const GREETING_TEXT = "직원이 잠시 자리를 비웠습니다. 응대가 필요하시면 호출하기 버튼을 눌러주세요!";
        const FIREBASE_URL = "https://storecall0313-default-rtdb.asia-southeast1.firebasedatabase.app";
        const WEBHOOK_URL = "https://eoi3awxk3goghm7.m.pipedream.net";
        
        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();
        const synthesis = window.speechSynthesis;
        let isLooping = false;
        let firstTouchDone = false;
        let currentUtterance = null; // 메모리 소실 방지용 전역 변수
        
        const mainDisplay = document.getElementById('main-display');
        const callBtn = document.getElementById('call-btn');
        const resetBtn = document.getElementById('reset-btn'); 

        function speak() { 
            if (!isLooping) return; 
            synthesis.cancel(); 
            currentUtterance = new SpeechSynthesisUtterance(GREETING_TEXT); 
            currentUtterance.lang = 'ko-KR'; 
            currentUtterance.rate = 0.85; 
            currentUtterance.onend = () => { if(isLooping) setTimeout(speak, 7000); }; 
            synthesis.speak(currentUtterance); 
        }

        // 브라우저 오디오 권한 강제 해제(Unlock) 로직 추가
        function initAudio() {
            if (!firstTouchDone) { 
                firstTouchDone = true; 
                let unlockUtterance = new SpeechSynthesisUtterance('');
                synthesis.speak(unlockUtterance);
                
                if(!callBtn.disabled && resetBtn.classList.contains('hidden')) { 
                    isLooping = true; 
                    setTimeout(speak, 100); 
                } 
            }
        }
        
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { passive: true, once: true });
        
        window.sendCall = function() { 
            if (callBtn.disabled) return; 
            isLooping = false; 
            synthesis.cancel(); 
            callBtn.disabled = true; 
            callBtn.innerText = "REQUESTING..."; 
            callBtn.className = "outline-btn w-full max-w-sm py-6 rounded-md text-xl"; 
            callBtn.style.opacity = "0.5"; 
            mainDisplay.innerHTML = `<p class="text-2xl md:text-3xl font-light text-slate-400 tracking-[0.1em] animate-pulse">매니저에게 신호를 전달하고 있습니다.</p>`; 
            fetch(`${WEBHOOK_URL}?store_id=${STORE_ID}`, { mode: 'no-cors' }); 
        };
        
        db.ref(`stores/${STORE_ID}/manager_reply`).on('value', (snap) => { 
            const msg = snap.val(); 
            if (msg && msg !== "대기 중...") { 
                isLooping = false; 
                synthesis.cancel(); 
                mainDisplay.innerHTML = `<span class='text-[#c5a059] font-medium text-3xl md:text-4xl tracking-tight leading-snug'>${msg}</span>`; 
                callBtn.classList.add('hidden'); 
                resetBtn.classList.remove('hidden'); 
            } 
        });
        
        window.managerArrives = function() { 
            db.ref(`stores/${STORE_ID}/manager_reply`).set("대기 중..."); 
            mainDisplay.innerHTML = `<p class="text-2xl md:text-3xl font-light leading-relaxed tracking-tight text-slate-200">직원이 잠시 자리를 비웠습니다.<br>응대가 필요하시면 <span class="text-[#c5a059] font-medium">[호출하기]</span>버튼을 눌러주세요!</p>`; 
            callBtn.className = "gold-btn w-full max-w-sm py-6 rounded-md text-2xl font-bold shadow-[0_8px_30px_rgba(197,160,89,0.35)]"; 
            callBtn.innerText = "호출하기"; 
            callBtn.disabled = false; 
            callBtn.style.opacity = "1"; 
            callBtn.classList.remove('hidden'); 
            resetBtn.classList.add('hidden'); 
            isLooping = true; 
            speak(); 
        };
        
        window.managerLeaves = function() { 
            if(!resetBtn.classList.contains('hidden') || callBtn.disabled) return; 
            isLooping = true; 
            speak(); 
        };
    </script>
</body>
</html>
